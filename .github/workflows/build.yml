name: Build WDA for iOS 26

on:
  workflow_dispatch:

jobs:
  build-wda:
    runs-on: macos-15
    steps:
      - name: Check Xcode versions
        run: |
          ls /Applications/ | grep Xcode
          xcodebuild -version

      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Use latest available Xcode
        run: |
          # Пробуем Xcode 26.x если есть, иначе берём последний доступный
          if [ -d "/Applications/Xcode_26.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
            echo "Using Xcode 26.2"
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
            echo "Using Xcode 16.2"
          else
            LATEST=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
            sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"
            echo "Using $LATEST"
          fi
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Install npm deps
        run: cd WebDriverAgent && npm install

      - name: Build WDA
        run: |
          cd WebDriverAgent
          mkdir -p Resources/WebDriverAgent.bundle
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          cd WebDriverAgent
          APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "App: $APP"
          plutil -p "$APP/Info.plist" | grep -E "DTPlatform|DTXcode|MinimumOS"
          mkdir -p Payload
          cp -r "$APP" Payload/
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTest.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTestCore.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTestSupport.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTAutomationSupport.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCUIAutomation.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCUnit.framework
          zip -rq WDA.ipa Payload
          ls -lh WDA.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA-iOS26
          path: WebDriverAgent/WDA.ipa
