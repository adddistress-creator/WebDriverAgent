name: Build and Sign WDA

on:
  workflow_dispatch:

jobs:
  build-sign:
    runs-on: macos-14
    env:
      FASTLANE_USER: ${{ secrets.APPLE_ID }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      FASTLANE_DONT_STORE_PASSWORD: "1"

    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Setup Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm deps
        run: cd WebDriverAgent && npm install

      - name: Install Fastlane
        run: gem install fastlane --no-document -q

      - name: Setup keychain
        run: |
          security create-keychain -p "build123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Register device
        run: |
          fastlane run register_device \
            name:"iPhone12mini" \
            udid:"00008101-001638D81468001E"

      - name: Get certificate and profile
        run: |
          # Download development certificate
          fastlane cert development \
            --output_path "." \
            --keychain_path "$HOME/Library/Keychains/build.keychain-db" \
            --keychain_password "build123"

          echo "=== Certs ==="
          ls -la *.cer 2>/dev/null || echo "no cer"
          echo "=== Identities ==="
          security find-identity -v -p codesigning

          # Get provisioning profile
          fastlane sigh \
            --app_identifier "io.wda.runner" \
            --development \
            --output_path "." \
            --filename "WDA.mobileprovision"

          echo "=== Profile ==="
          ls -la WDA.mobileprovision 2>/dev/null || echo "no profile"

      - name: Build WDA
        run: |
          cd WebDriverAgent
          mkdir -p Resources/WebDriverAgent.bundle

          IDENTITY=$(security find-identity -v -p codesigning | grep "iPhone" | head -1 | awk -F'"' '{print $2}')
          echo "Identity: $IDENTITY"

          PROFILE_UUID=$(python3 -c "
          import plistlib, subprocess
          result = subprocess.run(['security', 'cms', '-D', '-i', '../WDA.mobileprovision'], capture_output=True)
          data = plistlib.loads(result.stdout)
          print(data['UUID'])
          " 2>/dev/null || echo "")
          echo "Profile UUID: $PROFILE_UUID"

          TEAM=$(security find-identity -v -p codesigning | grep "iPhone" | head -1 | grep -oE '\([A-Z0-9]{10}\)' | tr -d '()')
          echo "Team: $TEAM"

          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          cd WebDriverAgent
          APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "App: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -rq WDA-signed.ipa Payload
          ls -lh WDA-signed.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Signed
          path: WebDriverAgent/WDA-signed.ipa
