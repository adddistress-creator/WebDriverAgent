name: WDA Standalone Build (Ultimate Info)

on:
  workflow_dispatch: # Ручной запуск

jobs:
  build-wda:
    runs-on: macos-14
    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build Standalone Runner
        run: |
          cd WebDriverAgent
          
          # Собираем проект как полноценное приложение (НЕ тест)
          # Флаги -all_load и -ObjC принудительно вшивают код сервера в бинарник
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            OTHER_LDFLAGS="-all_load -ObjC" \
            GCC_PREPROCESSOR_DEFINITIONS='$(inherited) FB_RETAIN_CYCLE_DETECTOR_ENABLED=0' \
            COMPILER_INDEX_STORE_ENABLE=NO | xcpretty

      - name: Create Unsigned IPA & Deep Analysis
        run: |
          cd WebDriverAgent
          mkdir -p Payload
          
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Ошибка: Приложение не найдено в build/"
            exit 1
          fi
          
          echo "✅ Найдено: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # Проверка на наличие внешнего фреймворка
          LIB_FRAMEWORK=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentLib.framework" -type d | head -n 1)
          if [ -d "$LIB_FRAMEWORK" ]; then
             echo "📦 Вшиваем WebDriverAgentLib в папку Frameworks..."
             mkdir -p Payload/WebDriverAgentRunner-Runner.app/Frameworks
             cp -r "$LIB_FRAMEWORK" Payload/WebDriverAgentRunner-Runner.app/Frameworks/
          fi

          # --- СЕКЦИЯ 500% ИНФОРМАЦИИ ---
          echo -e "\n\n"
          echo "======================================================="
          echo "🔍 ГЛУБОКИЙ АНАЛИЗ БИНАРНОГО ФАЙЛА (DEBUG INFO)"
          echo "======================================================="
          
          EXECUTABLE="Payload/WebDriverAgentRunner-Runner.app/WebDriverAgentRunner-Runner"
          
          echo "1. АРХИТЕКТУРА (Ожидаем arm64):"
          lipo -info "$EXECUTABLE"
          
          echo -e "\n2. ВЕС БИНАРНИКА (Ожидаем > 3MB):"
          ls -lh "$EXECUTABLE"
          
          echo -e "\n3. ЗАВИСИМОСТИ (Ищем WebDriverAgentLib):"
          otool -L "$EXECUTABLE" | grep -i "WebDriverAgent" || echo "Библиотека вшита статически (это хорошо)"
          
          echo -e "\n4. КЛЮЧЕВЫЕ СИМВОЛЫ (Проверка наличия кода сервера):"
          # Ищем упоминания FB (WebDriverAgent) и XCUI (Apple Test Framework)
          nm "$EXECUTABLE" | grep -E "FB|XCUI" | head -n 30 || echo "❌ СИМВОЛЫ НЕ НАЙДЕНЫ! Билд пустой."
          
          echo -e "\n5. ПРОВЕРКА IDENTIFIER В INFO.PLIST:"
          plutil -p Payload/WebDriverAgentRunner-Runner.app/Info.plist | grep -E "CFBundleIdentifier|CFBundleExecutable"
          
          echo "======================================================="
          echo -e "\n\n"
          # ------------------------------

          # Архивируем в IPA
          zip -rq WebDriverAgent.ipa Payload
          
          echo "=== ИТОГОВАЯ СТАТИСТИКА ==="
          ls -lh WebDriverAgent.ipa
          echo "✅ Билд завершен успешно."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Final-Standalone
          path: WebDriverAgent/WebDriverAgent.ipa
