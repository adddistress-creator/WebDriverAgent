name: Build WDA IPA (Official Standard)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build WDA
        run: |
          # Используем официальный подход clean + build-for-testing
          xcodebuild clean build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package for Real Device
        run: |
          mkdir -p Payload
          # Инструкция требует именно этот .app файл
          find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d -exec cp -r {} Payload/ \;
          zip -rq WebDriverAgent.ipa Payload
          echo "✅ IPA готов. Размер: $(ls -lh WebDriverAgent.ipa | awk '{print $5}')"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WDA_Official_Build
          path: WebDriverAgent.ipa
