name: Build WDA IPA (Fixed Signing)

on:
  workflow_dispatch:

jobs:
  build-wda:
    runs-on: macos-15
    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Use Xcode 26.2
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version

      - name: Install npm deps
        run: cd WebDriverAgent && npm install

      - name: Build WDA
        run: |
          cd WebDriverAgent
          mkdir -p Resources/WebDriverAgent.bundle
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Sign all components with ad-hoc
        run: |
          cd WebDriverAgent
          APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "App: $APP"

          # Подписываем xctest бандл (самое важное!)
          XCTEST="$APP/PlugIns/WebDriverAgentRunner.xctest"
          
          # Подписываем бинарник внутри xctest
          codesign --force --sign "-" --timestamp=none \
            --entitlements /dev/null \
            "$XCTEST/WebDriverAgentRunner"
          
          # Подписываем фреймворки внутри xctest
          find "$XCTEST/Frameworks" -name "*.framework" 2>/dev/null | while read fw; do
            codesign --force --sign "-" --timestamp=none "$fw"
          done
          
          # Подписываем сам xctest
          codesign --force --sign "-" --timestamp=none "$XCTEST"
          
          # Подписываем фреймворки основного app
          find "$APP/Frameworks" -name "*.framework" 2>/dev/null | while read fw; do
            codesign --force --sign "-" --timestamp=none "$fw"
          done
          
          # Подписываем основной app
          codesign --force --sign "-" --timestamp=none "$APP"
          
          echo "=== Проверка подписей ==="
          codesign -v "$XCTEST/WebDriverAgentRunner" && echo "xctest binary: OK" || echo "xctest binary: FAIL"
          codesign -v "$XCTEST" && echo "xctest bundle: OK" || echo "xctest bundle: FAIL"
          codesign -v "$APP" && echo "app: OK" || echo "app: FAIL"

      - name: Package IPA
        run: |
          cd WebDriverAgent
          APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          
          # Убираем лишние XC* фреймворки
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTest.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTestCore.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTestSupport.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTAutomationSupport.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCUIAutomation.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCUnit.framework
          
          zip -rq WDA_signed.ipa Payload
          ls -lh WDA_signed.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Fixed-Signing
          path: WebDriverAgent/WDA_signed.ipa
