name: Build WDA IPA (FORCE FULL MODE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Force Build WebDriverAgentRunner
        run: |
          # Собираем WebDriverAgentRunner. 
          # Мы используем 'build', но с флагом 'generic/platform=iOS', 
          # чтобы он собрал полноценные бинарники arm64.
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            OTHER_LDFLAGS="-all_load -ObjC"

      - name: Create IPA from Runner
        run: |
          mkdir -p Payload
          
          # 1. Находим основной Runner-App
          # Он обычно лежит в build/Build/Products/Release-iphoneos/
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
             echo "❌ Ошибка: Runner.app не найден!"
             exit 1
          fi
          
          echo "Найден путь: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # 2. ВАЖНЫЙ ШАГ: В WebDriverAgentRunner код сервера часто лежит в WebDriverAgentLib.framework
          # Мы проверяем, есть ли он там, если нет - ищем где он спрятан и закидываем в Payload
          LIB_FRAMEWORK=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentLib.framework" -type d | head -n 1)
          if [ -d "$LIB_FRAMEWORK" ]; then
             echo "Копируем WebDriverAgentLib внутрь приложения..."
             mkdir -p Payload/WebDriverAgentRunner-Runner.app/Frameworks
             cp -r "$LIB_FRAMEWORK" Payload/WebDriverAgentRunner-Runner.app/Frameworks/
          fi

          # 3. Упаковка
          zip -rq WebDriverAgent.ipa Payload
          
          SIZE=$(du -m WebDriverAgent.ipa | cut -f1)
          echo "✅ ИТОГОВЫЙ IPA: ${SIZE}MB"

      - name: Check internal size
        run: |
          # Посмотрим, сколько весит сам бинарник внутри
          ls -lh Payload/WebDriverAgentRunner-Runner.app/WebDriverAgentRunner-Runner || true

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Runner-Full-IPA
          path: WebDriverAgent.ipa
