name: Build and Sign WDA

on:
  workflow_dispatch:

jobs:
  build-sign:
    runs-on: macos-14
    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Setup Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm deps
        run: cd WebDriverAgent && npm install

      - name: Add Apple ID to keychain
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Add Apple ID credentials to keychain
          xcrun altool --store-password-in-keychain-item "WDA_BUILD" \
            -u "$APPLE_ID" -p "$APPLE_PASSWORD" 2>/dev/null || true

      - name: Register device + get provisioning profile via Fastlane
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          gem install fastlane --no-document -q

          # Register iPhone
          fastlane run register_device \
            name:"iPhone12mini" \
            udid:"00008101-001638D81468001E" \
            username:"$APPLE_ID" \
            password:"$APPLE_PASSWORD"

          # Get development cert
          fastlane cert development \
            --username "$APPLE_ID" \
            --output_path "." \
            --keychain_path "$(pwd)/build.keychain" \
            --keychain_password "build"

          # Get provisioning profile
          fastlane sigh \
            --username "$APPLE_ID" \
            --app_identifier "io.wda.runner" \
            --development \
            --output_path "." \
            --filename "WDA.mobileprovision"

          echo "=== Certs ==="
          ls -la *.cer 2>/dev/null || true
          echo "=== Profiles ==="
          ls -la *.mobileprovision 2>/dev/null || true
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning build.keychain

      - name: Build and sign WDA
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          cd WebDriverAgent
          mkdir -p Resources/WebDriverAgent.bundle

          # Get signing identity
          IDENTITY=$(security find-identity -v -p codesigning ~/../../build.keychain | grep "iPhone" | head -1 | awk -F'"' '{print $2}')
          echo "Signing identity: $IDENTITY"

          # Get provisioning profile UUID
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/../../WDA.mobileprovision 2>/dev/null) 2>/dev/null || echo "")
          echo "Profile UUID: $PROFILE_UUID"

          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="$(echo $IDENTITY | grep -oE '\([A-Z0-9]+\)' | tr -d '()')"

      - name: Package IPA
        run: |
          cd WebDriverAgent
          APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "App: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -rq WDA-signed.ipa Payload
          ls -lh WDA-signed.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Signed
          path: WebDriverAgent/WDA-signed.ipa
