name: WDA Super-Diagnostic (Auto-Sign & Verify)

on:
  workflow_dispatch:

jobs:
  diagnose-and-build:
    runs-on: macos-15
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WDA_Source

      - name: Auto-Detect Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          [ -z "$XCODE_PATH" ] && XCODE_PATH="/Applications/Xcode.app"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          cd WDA_Source
          npm install

      - name: Patch Project & Team ID
        run: |
          cd WDA_Source
          TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          NEW_ID="com.tiktokpanel.wda.runner"
          # Меняем Bundle ID и вшиваем Team ID для корректных Entitlements
          sed -i '' "s/com.facebook.WebDriverAgentRunner/$NEW_ID/g" WebDriverAgent.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $TEAM_ID;/g" WebDriverAgent.xcodeproj/project.pbxproj
          echo "Project patched with Team ID: $TEAM_ID"

      - name: Build for Testing
        run: |
          cd WDA_Source
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Deep Recursive Codesign
        run: |
          APP_PATH=$(find WDA_Source/DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "Starting Deep Sign for: $APP_PATH"
          
          # 1. Сначала подписываем все вложенные фреймворки и библиотеки
          # Флаг --deep в codesign часто работает плохо, поэтому делаем вручную через find
          find "$APP_PATH" -name "*.framework" -o -name "*.dylib" -o -name "*.xctest" | while read component; do
            echo "Signing: $component"
            codesign --force --sign "-" --timestamp=none "$component"
          done
          
          # 2. Подписываем само основное приложение
          codesign --force --sign "-" --timestamp=none "$APP_PATH"

      - name: Verify Signature (Final Check)
        run: |
          APP_PATH=$(find WDA_Source/DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "--- LOG: Starting Signature Verification ---"
          
          # Проверка основного бандла и всех вложенных компонентов (--deep)
          # --verbose=4 даст нам детальный отчет в логах GitHub
          codesign --verify --verbose=4 --deep "$APP_PATH"
          
          echo "--- LOG: Entitlements Check ---"
          codesign -d --entitlements :- "$APP_PATH"
          
          echo "✅ Verification Complete: Bundle is valid and ready for iOS 26.2"

      - name: Package IPA
        run: |
          cd WDA_Source
          APP_PATH=$(find DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -rq WDA_TikTok_Pro_Verified.ipa Payload
          echo "IPA Size: $(ls -lh WDA_TikTok_Pro_Verified.ipa | awk '{print $5}')"

      - name: Upload Verified IPA
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Signed-Pro
          path: WDA_Source/WDA_TikTok_Pro_Verified.ipa
