name: Build WebDriverAgent IPA (FINAL STABLE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4
        with:
          # Используем официальный репозиторий Appium
          repository: appium/WebDriverAgent
          path: WebDriverAgent
          
      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build WebDriverAgent (Monolithic Build)
        run: |
          cd WebDriverAgent
          # Ключевые флаги: 
          # 1. Сборка как статической библиотеки, чтобы вшить код сервера
          # 2. -all_load для включения всех категорий Objective-C
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            OTHER_LDFLAGS="-all_load -ObjC" \
            -quiet

      - name: Verify and Package IPA
        run: |
          cd WebDriverAgent
          
          # Находим путь к .app (исключая dSYM)
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/WebDriverAgentRunner-Runner" ]; then
            echo "❌ Ошибка: Реальное приложение не найдено!"
            exit 1
          fi
          
          echo "✅ Найдено приложение: $APP_PATH"
          echo "BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")"
          
          # Подготовка Payload
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          
          # Проверяем наличие WebDriverAgentLib внутри (она должна быть либо в Frameworks, либо вшита в бинарник)
          BINARY_SIZE=$(ls -lh "Payload/WebDriverAgentRunner-Runner.app/WebDriverAgentRunner-Runner" | awk '{print $5}')
          echo "📊 Размер основного бинарника: $BINARY_SIZE"
          
          # Упаковка
          zip -rq WebDriverAgent.ipa Payload
          
          echo "APP_PATH_FINAL=$GITHUB_WORKSPACE/WebDriverAgent/WebDriverAgent.ipa" >> $GITHUB_ENV
          echo "✅ IPA готов. Размер: $(ls -lh WebDriverAgent.ipa | awk '{print $5}')"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-Fixed-Release
          path: WebDriverAgent/WebDriverAgent.ipa
