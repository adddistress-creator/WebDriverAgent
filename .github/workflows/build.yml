name: Build WDA iOS 26 Custom BundleID

on:
  workflow_dispatch:

jobs:
  build-wda:
    runs-on: macos-15
    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Use Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install npm deps
        run: cd WebDriverAgent && npm install

      - name: Change Bundle ID
        run: |
          cd WebDriverAgent
          # Меняем bundle ID на уникальный
          sed -i '' 's/com.facebook.WebDriverAgentRunner/io.github.wda.runner/g' WebDriverAgent.xcodeproj/project.pbxproj
          echo "Bundle ID changed"
          grep "io.github.wda.runner" WebDriverAgent.xcodeproj/project.pbxproj | head -5

      - name: Build WDA
        run: |
          cd WebDriverAgent
          mkdir -p Resources/WebDriverAgent.bundle
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          cd WebDriverAgent
          APP=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "App: $APP"
          plutil -p "$APP/Info.plist" | grep -E "CFBundleIdentifier|DTPlatform"
          mkdir -p Payload
          cp -r "$APP" Payload/
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTest.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTestCore.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTestSupport.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCTAutomationSupport.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCUIAutomation.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XCUnit.framework
          zip -rq WDA.ipa Payload
          ls -lh WDA.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA-iOS26-CustomID
          path: WebDriverAgent/WDA.ipa
