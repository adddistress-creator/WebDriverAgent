name: WDA Super-Diagnostic (Xcode Auto-Detect)

on:
  workflow_dispatch:

jobs:
  diagnose-and-build:
    runs-on: macos-15
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WDA_Source

      - name: Auto-Detect & Select Highest Xcode
        run: |
          echo "--- LOG: Searching for available Xcode versions ---"
          ls /Applications | grep Xcode
          
          # Ищем самую высокую версию (например, Xcode_26.2.app или Xcode_16.2.app)
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          
          if [ -z "$XCODE_PATH" ]; then
            echo "Standard Xcode not found in custom path, using default"
            XCODE_PATH="/Applications/Xcode.app"
          fi
          
          echo "Selected Xcode Path: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd WDA_Source
          npm install

      - name: Patch Bundle ID
        run: |
          cd WDA_Source
          NEW_ID="com.tiktokpanel.wda.runner"
          sed -i '' "s/com.facebook.WebDriverAgentRunner/$NEW_ID/g" WebDriverAgent.xcodeproj/project.pbxproj
          echo "Confirmed Bundle ID in project: $NEW_ID"

      - name: Build for Testing (Diagnostic Mode)
        run: |
          cd WDA_Source
          mkdir -p Resources/WebDriverAgent.bundle
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Detailed Framework Analysis
        run: |
          APP_PATH=$(find WDA_Source/DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          echo "Analyzing: $APP_PATH"
          
          echo "--- [1] Frameworks List ---"
          if [ -d "$APP_PATH/Frameworks" ]; then
            ls -R "$APP_PATH/Frameworks"
          else
            echo "CRITICAL ERROR: No Frameworks folder!"
          fi
          
          echo "--- [2] Info.plist Content ---"
          plutil -p "$APP_PATH/Info.plist" | grep -E "CFBundleIdentifier|DTPlatformVersion|MinimumOSVersion"

      - name: Package IPA (Safe Mode)
        run: |
          cd WDA_Source
          APP_PATH=$(find DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          
          # ВАЖНО: Мы НЕ используем rm -rf для XCTest
          # Это предотвратит ошибку 103 на твоем iPhone 12 Mini
          
          zip -rq WDA_Diagnostic_V2.ipa Payload
          echo "Final IPA Size:"
          ls -lh WDA_Diagnostic_V2.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Diagnostic-V2
          path: WDA_Source/WDA_Diagnostic_V2.ipa
