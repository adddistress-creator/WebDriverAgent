name: Build WDA IPA (FULL FIXED MODE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build and Archive (IntegrationApp)
        # Мы меняем схему на IntegrationApp, потому что это полноценное приложение-хост.
        # Оно принудительно затягивает в себя WebDriverAgentLib.
        run: |
          xcodebuild archive \
            -project WebDriverAgent.xcodeproj \
            -scheme IntegrationApp \
            -destination 'generic/platform=iOS' \
            -archivePath build/WDA.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SKIP_INSTALL=NO

      - name: Prepare Payload and IPA
        run: |
          mkdir -p Payload
          # Берем скомпилированное приложение из архива
          APP_PATH=$(find build/WDA.xcarchive/Products/Applications -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Ошибка: Приложение не найдено в архиве!"
            exit 1
          fi
          
          echo "Копируем: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # Проверяем, что внутри есть бинарник и он не пустой
          echo "=== СОДЕРЖИМОЕ ПРИЛОЖЕНИЯ ==="
          ls -R Payload/*.app
          echo "============================"
          
          zip -rq WebDriverAgent.ipa Payload
          
          SIZE=$(du -m WebDriverAgent.ipa | cut -f1)
          echo "✅ ИТОГОВЫЙ IPA: ${SIZE}MB"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: WDA-IntegrationApp-IPA
          path: WebDriverAgent.ipa
