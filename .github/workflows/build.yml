name: Diagnose WDA

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: macos-14
    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Collect all info
        run: |
          cd WebDriverAgent

          echo "===== XCODE VERSION ====="
          xcodebuild -version

          echo "===== AVAILABLE XCODE APPS ====="
          ls /Applications/ | grep Xcode

          echo "===== REPO ROOT FILES ====="
          ls -la

          echo "===== SCRIPTS FOLDER ====="
          ls Scripts/ 2>/dev/null || echo "NO Scripts/ folder"

          echo "===== XCODEPROJ SCHEMES ====="
          xcodebuild -project WebDriverAgent.xcodeproj -list 2>&1

          echo "===== INFO.PLIST LOCATIONS ====="
          find . -name "Info.plist" | grep -v build | grep -v ".git"

          echo "===== PODFILE EXISTS ====="
          ls Podfile 2>/dev/null || echo "NO Podfile"

          echo "===== CARTFILE EXISTS ====="
          ls Cartfile 2>/dev/null || echo "NO Cartfile"

          echo "===== PACKAGE.JSON EXISTS ====="
          ls package.json 2>/dev/null || echo "NO package.json"

          echo "===== XCCONFIG FILES ====="
          find . -name "*.xcconfig" | grep -v build | grep -v ".git"

          echo "===== HEADER FILES (CDStructures) ====="
          find . -name "CDStructures.h" | grep -v build

          echo "===== BREW PACKAGES ====="
          brew list | grep -E "carthage|cocoapods|node"

          echo "===== CARTHAGE VERSION ====="
          carthage version 2>/dev/null || echo "NO carthage"

          echo "===== POD VERSION ====="
          pod --version 2>/dev/null || echo "NO cocoapods"
