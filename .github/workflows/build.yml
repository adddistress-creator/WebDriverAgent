name: Build WDA IPA

on:
  workflow_dispatch:

jobs:
  build-wda:
    runs-on: macos-14
    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Setup Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install npm deps (needed by fetch script)
        run: |
          cd WebDriverAgent
          npm install

      - name: Try fetch prebuilt WDA
        id: fetch
        run: |
          cd WebDriverAgent
          node Scripts/fetch-prebuilt-wda.mjs 2>&1
          IPA=$(find . -name "*.ipa" | head -n 1)
          if [ -n "$IPA" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "ipa_path=$IPA" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Build from source
        if: steps.fetch.outputs.found != 'true'
        run: |
          cd WebDriverAgent
          mkdir -p Resources/WebDriverAgent.bundle
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA from build
        if: steps.fetch.outputs.found != 'true'
        run: |
          cd WebDriverAgent
          APP=$(find build/Build/Products -name "*.app" -type d | head -n 1)
          echo "App: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -rq WebDriverAgent.ipa Payload
          ls -lh WebDriverAgent.ipa

      - name: Collect IPA
        run: |
          IPA=$(find WebDriverAgent -name "*.ipa" | head -n 1)
          echo "IPA: $IPA"
          cp "$IPA" final.ipa
          ls -lh final.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent
          path: final.ipa
