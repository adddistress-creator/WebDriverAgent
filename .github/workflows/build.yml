name: Build WDA IPA (FIXED SIZE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build WDA Runner
        run: |
          # Используем просто build, это создаст полноценное приложение
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package and Verify
        run: |
          mkdir -p Payload
          # Ищем .app файл во всей папке build
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Ошибка: WebDriverAgentRunner-Runner.app не найден!"
            exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -rq WebDriverAgent.ipa Payload
          
          # ПРОВЕРКА РАЗМЕРА
          SIZE=$(du -m WebDriverAgent.ipa | cut -f1)
          echo "✅ IPA готов. Размер: ${SIZE}MB"
          
          if [ "$SIZE" -lt 15 ]; then
            echo "❌ Ошибка: IPA слишком маленький (${SIZE}MB). Это пустышка!"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-REAL-IPA
          path: WebDriverAgent.ipa
