name: Build WDA IPA (FULL DEBUG MODE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 1. Ревизия исходников (Tree)
        run: |
          echo "=== СТРУКТУРА РЕПОЗИТОРИЯ ==="
          find . -maxdepth 3 -not -path '*/.*'
          echo "============================="

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: 2. Сборка (Verbose)
        run: |
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

      - name: 3. Глубокий анализ артефактов
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Ошибка: .app не найден!"
            exit 1
          fi

          echo "=== АНАЛИЗ БИНАРНИКА ==="
          BINARY_PATH="$APP_PATH/WebDriverAgentRunner-Runner"
          if [ -f "$BINARY_PATH" ]; then
            ls -lh "$BINARY_PATH"
            echo "Тип файла:"
            file "$BINARY_PATH"
            echo "Архитектуры внутри:"
            lipo -info "$BINARY_PATH"
          else
            echo "⚠️ ОСНОВНОЙ БИНАРНИК ОТСУТСТВУЕТ ПО ПУТИ $BINARY_PATH"
          fi
          echo "========================"

          echo "=== ПРОВЕРКА ВЛОЖЕННЫХ ФРЕЙМВОРКОВ ==="
          find "$APP_PATH" -name "*.framework" -exec ls -lh {} \;
          find "$APP_PATH" -name "*.xctest" -exec ls -lh {} \;
          echo "======================================"

          cp -r "$APP_PATH" Payload/
          zip -rq WebDriverAgent.ipa Payload
          
          SIZE=$(du -m WebDriverAgent.ipa | cut -f1)
          echo "✅ ИТОГОВЫЙ IPA: ${SIZE}MB"

      - name: Upload Debug Log
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-DEBUG-IPA
          path: WebDriverAgent.ipa
