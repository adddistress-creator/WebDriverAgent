name: Build WDA IPA

on:
  workflow_dispatch:

jobs:
  build-wda:
    runs-on: macos-14
    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: WebDriverAgent

      - name: Setup Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Try fetch prebuilt WDA
        id: fetch_prebuilt
        run: |
          cd WebDriverAgent
          node Scripts/fetch-prebuilt-wda.mjs 2>&1 && echo "PREBUILT=true" >> $GITHUB_OUTPUT || echo "PREBUILT=false" >> $GITHUB_OUTPUT

      - name: Check fetched IPA
        if: steps.fetch_prebuilt.outputs.PREBUILT == 'true'
        run: |
          find WebDriverAgent -name "*.ipa" 2>/dev/null
          echo "Prebuilt fetch succeeded"

      - name: Build from source (if prebuilt failed)
        if: steps.fetch_prebuilt.outputs.PREBUILT != 'true'
        run: |
          cd WebDriverAgent
          mkdir -p Resources/WebDriverAgent.bundle
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner-nodebug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            HEADER_SEARCH_PATHS='$(SRCROOT)/PrivateHeaders' \
            SWIFT_INCLUDE_PATHS='$(SRCROOT)/PrivateHeaders'

      - name: Create IPA from build
        if: steps.fetch_prebuilt.outputs.PREBUILT != 'true'
        run: |
          cd WebDriverAgent
          APP_PATH=$(find build/Build/Products -name "*.app" -type d | head -n 1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -rq WebDriverAgent.ipa Payload
          ls -lh WebDriverAgent.ipa

      - name: Find IPA (any source)
        run: |
          IPA=$(find WebDriverAgent -name "*.ipa" | head -n 1)
          echo "Found IPA: $IPA"
          cp "$IPA" WebDriverAgent.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent
          path: WebDriverAgent.ipa
